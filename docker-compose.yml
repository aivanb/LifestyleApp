# Development stack: hot reload, bind mounts, MySQL data persisted.
# Usage: docker compose up --build
# Copy .env.example to .env and set secrets first.

name: trackingapp

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-tracking_app}
      MYSQL_USER: ${DB_USER:-tracking}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DEBUG: "True"
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DOCKER_API_PROXY: http://backend:8000
      REACT_APP_API_URL: /api
      REACT_APP_ENV: development
      WATCHPACK_POLLING: "true"
      HOST: "0.0.0.0"
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: "0"
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
  frontend_node_modules:
