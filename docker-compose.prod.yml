# Production stack: MySQL + Gunicorn (8000) + nginx (80) serving SPA and proxying API.
# Published ports (defaults): web 80 + 3000 (same UI), backend 8000 (API direct).
# Usage: docker compose -f docker-compose.prod.yml up --build -d
# Set strong secrets in .env; see .env.example.
# Project name: set COMPOSE_PROJECT_NAME in .env if desired (avoids top-level `name:` for older Compose).

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-tracking_app}
      MYSQL_USER: ${DB_USER:-tracking}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DEBUG: "False"
      RUN_SETUP_REQUIRED: ${RUN_SETUP_REQUIRED:-0}
    ports:
      - "${BACKEND_PUBLISH_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        REACT_APP_API_URL: /api
        REACT_APP_ENV: production
    restart: unless-stopped
    ports:
      - "${WEB_PUBLISH_PORT:-80}:80"
      - "${FRONTEND_PUBLISH_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
